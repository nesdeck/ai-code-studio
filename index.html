<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat · Code Studio</title>
    <!-- Font Awesome (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- CodeMirror (editor) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
    <!-- Highlight.js (for code blocks) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <!-- Marked (markdown parser) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <!-- Supabase client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ----- RESET & GLOBAL ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            height: 100vh;
            overflow: hidden;
            background-color: #1f1f1f;
            color: #ffffff;
        }
        #app {
            display: flex;
            height: 100%;
            width: 100%;
        }

        /* ----- DARK THEME (only) ----- */
        .sidebar {
            background-color: #2a2a2a;
            border-right: 1px solid #3a3a3a;
        }
        .chat-panel,
        .editor-panel {
            background-color: #1f1f1f;
        }
        .divider {
            background-color: #3a3a3a;
        }
        .input-wrapper,
        .editor-footer {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
        }
        .chat-history-item:hover {
            background-color: #3a3a3a;
        }
        .modal-content {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
        }
        .delete-chat-btn {
            color: #ff6b6b;
        }

        /* ----- ACCENT COLOR (CSS variable, default Capri) ----- */
        :root {
            --accent-color: #00BFFF;
            --accent-hover: #0099cc;
        }

        .logo i,
        .send-btn, .attach-btn,
        .delete-chat-btn:hover,
        .message.ai .message-text,
        #login-btn.logged-in i,
        .code-block-header button i,
        .code-block-header button,
        .code-language,
        #model-select,
        #credit-balance,
        #credit-balance i,
        .login-container .create-account-link,
        .close-modal:hover {
            color: var(--accent-color);
        }
        .new-chat-btn,
        .collapse-btn,
        .footer-btn,
        .download-btn,
        #modal-login-btn, #modal-register-btn,
        .modal-content button,
        .login-container button,
        #profile-modal .logout-btn,
        #register-modal .register-btn {
            background-color: var(--accent-color);
        }
        .new-chat-btn:hover,
        .collapse-btn:hover,
        .footer-btn:hover,
        .download-btn:hover,
        #modal-login-btn:hover, #modal-register-btn:hover,
        .modal-content button:hover,
        .login-container button:hover,
        #profile-modal .logout-btn:hover,
        #register-modal .register-btn:hover {
            background-color: var(--accent-hover);
        }
        .divider:hover,
        .divider.dragging {
            background-color: var(--accent-color);
        }
        .chat-history-item.active {
            border-left-color: var(--accent-color);
        }
        .sidebar-search input:focus {
            border-color: var(--accent-color);
        }
        .typing-indicator span {
            background-color: var(--accent-color);
        }
        .attachment-chip {
            background-color: var(--accent-color);
        }

        /* ----- LOGIN STATE (blur header and input when not logged in) ----- */
        body:not(.logged-in) .chat-header,
        body:not(.logged-in) .chat-input-area {
            opacity: 0.3;
            pointer-events: none;
            filter: blur(2px);
            transition: opacity 0.2s, filter 0.2s;
        }

        /* ----- SIDEBAR ----- */
        .sidebar {
            width: 260px;
            display: flex;
            flex-direction: column;
            transition: width 0.2s ease;
            overflow: visible;
            flex-shrink: 0;
            position: relative;
        }
        .sidebar.collapsed {
            width: 70px;
        }
        .sidebar.collapsed .logo span,
        .sidebar.collapsed .new-chat-btn span,
        .sidebar.collapsed .sidebar-search input,
        .sidebar.collapsed .chat-history-item span,
        .sidebar.collapsed .sidebar-bottom button span {
            display: none;
        }
        .sidebar.collapsed .sidebar-top {
            padding: 20px 0;
        }
        .sidebar.collapsed .logo {
            justify-content: center;
            margin-bottom: 24px;
        }
        .sidebar.collapsed .sidebar-bottom {
            flex-direction: column;
            gap: 10px;
            align-items: center;
            justify-content: center;
            padding: 16px 0;
        }
        .sidebar.collapsed .sidebar-bottom .icon-row {
            flex-direction: column;
            gap: 10px;
            width: 100%;
            margin-bottom: 0;
        }
        .sidebar.collapsed .new-chat-btn {
            width: 40px;
            height: 40px;
            padding: 0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        .sidebar.collapsed .new-chat-btn i {
            margin: 0;
        }
        .sidebar.collapsed .sidebar-bottom .icon-btn,
        .sidebar.collapsed .sidebar-bottom .color-picker-btn {
            margin: 0 auto;
        }
        .sidebar .collapse-btn {
            position: absolute;
            top: 50%;
            right: -12px;
            transform: translateY(-50%);
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            font-size: 0.8rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .sidebar .collapse-btn i {
            transition: transform 0.2s;
        }
        .sidebar-top {
            padding: 20px 16px;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .new-chat-btn {
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 30px;
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .sidebar-search {
            padding: 8px 16px;
            position: relative;
        }
        .sidebar-search i {
            position: absolute;
            left: 28px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }
        .sidebar-search input {
            width: 100%;
            padding: 8px 8px 8px 36px;
            border-radius: 20px;
            border: 1px solid transparent;
            background-color: rgba(255,255,255,0.1);
            color: inherit;
            outline: none;
        }
        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 8px 12px;
        }
        .chat-history-item {
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: relative;
        }
        .chat-history-item.active {
            background-color: rgba(0,191,255,0.2);
            border-left: 3px solid;
        }
        .chat-history-item .chat-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .delete-chat-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.2s;
            padding: 4px;
            border-radius: 4px;
        }
        .chat-history-item:hover .delete-chat-btn {
            opacity: 1;
        }
        .delete-chat-btn:hover {
            background-color: rgba(255,255,255,0.2);
        }
        .sidebar-bottom {
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-top: 1px solid #3a3a3a;
            position: relative;
        }
        .sidebar-bottom .icon-row {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-bottom: 8px;
            align-items: center;
        }
        .icon-btn {
            background: none;
            border: none;
            color: inherit;
            font-size: 1.3rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            transition: background 0.2s;
        }
        .icon-btn:hover {
            background-color: rgba(255,255,255,0.1);
        }
        .color-picker-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #3a3a3a;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            background-color: var(--accent-color);
            flex-shrink: 0;
            box-sizing: border-box;
        }
        .color-picker-btn:hover {
            transform: scale(1.1);
            border-color: #fff;
        }
        .color-dropdown {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 30px;
            padding: 8px;
            display: none;
            gap: 8px;
            z-index: 100;
        }
        .color-dropdown.show {
            display: flex;
        }
        .color-swatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: border 0.2s;
        }
        .color-swatch:hover {
            border-color: white;
        }
        .color-swatch.selected {
            border-color: white;
        }

        /* ----- MAIN PANEL (CHAT + EDITOR) ----- */
        .main-panel {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }
        .chat-panel {
            flex: 1 1 50%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 300px;
            transition: none;
        }
        .editor-panel {
            flex: 1 1 50%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 300px;
            transition: none;
        }
        .divider {
            width: 12px;
            cursor: col-resize;
            background-color: #3a3a3a;
            position: relative;
            z-index: 10;
            transition: background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .divider::after {
            content: '';
            width: 4px;
            height: 40px;
            background-color: #888;
            border-radius: 2px;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .divider:hover::after,
        .divider.dragging::after {
            opacity: 1;
            background-color: var(--accent-color);
        }
        .divider:hover,
        .divider.dragging {
            background-color: var(--accent-color);
        }

        /* ----- CHAT INTERFACE ----- */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background-color: #2a2a2a;
            border-bottom: 1px solid #3a3a3a;
        }
        .model-selector {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .model-selector label {
            font-size: 0.9rem;
            color: #ccc;
        }
        #model-select {
            background-color: transparent;
            color: var(--accent-color);
            border: none;
            padding: 6px 12px;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }
        #model-select optgroup {
            background-color: #2a2a2a;
            color: #ccc;
        }
        #model-select option {
            background-color: #2a2a2a;
            color: #fff;
        }
        #credit-balance {
            background-color: transparent;
            color: var(--accent-color);
            border: none;
            padding: 6px 16px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #credit-balance i {
            color: var(--accent-color);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 80%;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            color: #ffffff;
        }
        .message.ai {
            align-self: flex-start;
        }
        .message .timestamp {
            font-size: 0.7rem;
            color: #888;
            margin-top: 4px;
            text-align: right;
        }
        .error-message {
            color: #ff6b6b;
            background-color: rgba(255,107,107,0.1);
            border: 1px solid #ff6b6b;
            border-radius: 8px;
            padding: 10px;
            margin: 10px 0;
            text-align: center;
        }
        /* Code block container with toolbar */
        .code-block-container {
            background-color: #1e1e1e;
            border-radius: 8px;
            margin: 10px 0;
            overflow: hidden;
            border: 1px solid #3a3a3a;
        }
        .code-block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background-color: #2a2a2a;
            border-bottom: 1px solid #3a3a3a;
        }
        .code-language {
            font-size: 0.85rem;
            color: var(--accent-color);
            font-family: monospace;
        }
        .code-buttons {
            display: flex;
            gap: 8px;
        }
        .code-block-header button {
            background: none;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: background-color 0.2s;
        }
        .code-block-header button:hover {
            background-color: rgba(0,191,255,0.2);
        }
        .code-block-header button i {
            font-size: 0.9rem;
            color: var(--accent-color);
        }
        .code-block-content {
            padding: 12px;
            overflow-x: auto;
        }
        .code-block-content pre {
            margin: 0;
            background: transparent !important;
        }
        .code-block-content code {
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
        }
        /* Login form inside chat */
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            background-color: #2a2a2a;
            border-radius: 12px;
            border: 1px solid #3a3a3a;
        }
        .login-container h2 {
            margin-bottom: 20px;
            color: var(--accent-color);
        }
        .login-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 8px;
            border: 1px solid #3a3a3a;
            background-color: #1f1f1f;
            color: white;
            font-size: 1rem;
        }
        .login-container button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 12px;
        }
        .login-container .create-account-link {
            color: var(--accent-color);
            text-decoration: underline;
            cursor: pointer;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        .login-container .create-account-link:hover {
            opacity: 0.8;
        }
        .login-error {
            color: #ff6b6b;
            margin-top: 8px;
            font-size: 0.9rem;
        }
        /* Registration Modal */
        #register-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        #register-modal.show {
            display: flex;
        }
        .register-modal-content {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 16px;
            padding: 32px;
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .register-modal-content h2 {
            color: var(--accent-color);
            text-align: center;
            margin-bottom: 8px;
        }
        .register-modal-content input[type="email"],
        .register-modal-content input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #3a3a3a;
            background-color: #1f1f1f;
            color: white;
            font-size: 1rem;
        }
        .register-modal-content .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ccc;
            font-size: 0.9rem;
        }
        .register-modal-content .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .register-modal-content .checkbox-row label {
            cursor: pointer;
        }
        .register-modal-content .checkbox-row a {
            color: var(--accent-color);
            text-decoration: underline;
        }
        .register-modal-content button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .register-modal-content .close-modal {
            align-self: flex-end;
            font-size: 1.5rem;
            cursor: pointer;
            color: #888;
        }
        .register-modal-content .close-modal:hover {
            color: #fff;
        }
        .register-error {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: -8px;
        }

        /* Profile modal */
        #profile-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        #profile-modal.show {
            display: flex;
        }
        .profile-modal-content {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            border-radius: 16px;
            padding: 32px;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .profile-modal-content h2 {
            color: var(--accent-color);
            text-align: center;
        }
        .profile-info {
            font-size: 1.1rem;
            text-align: center;
        }
        .profile-modal-content button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        /* ----- CHAT INPUT ----- */
        .chat-input-area {
            padding: 22px;
            border-top: 1px solid #3a3a3a;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 30px;
            padding: 4px 8px;
            height: 56px;
        }
        .input-wrapper textarea {
            flex: 1;
            background: none;
            border: none;
            padding: 12px 8px;
            color: inherit;
            font-size: 1rem;
            resize: none;
            max-height: 120px;
            outline: none;
            height: 100%;
        }
        .send-btn, .attach-btn {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .send-btn:hover, .attach-btn:hover {
            background-color: rgba(255,255,255,0.1);
        }
        .attachment-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .attachment-chip {
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .attachment-chip i {
            cursor: pointer;
        }

        /* ----- CODE EDITOR (single pane) ----- */
        .editor-container {
            flex: 1;
            overflow: hidden;
        }
        .CodeMirror {
            height: 100%;
            font-size: 14px;
            background: transparent !important;
        }
        .CodeMirror-gutters {
            background: transparent !important;
        }
        .editor-footer {
            padding: 12px 16px;
            border-top: 1px solid #3a3a3a;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .footer-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .footer-btn {
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
            height: 36px;
            font-size: 0.9rem;
        }
        .footer-btn.clear-btn {
            background-color: #6c757d;
        }
        .footer-btn.clear-btn:hover {
            background-color: #5a6268;
        }
        .extension-select {
            background-color: #2a2a2a;
            color: inherit;
            border: 1px solid #3a3a3a;
            border-radius: 20px;
            padding: 6px 12px;
            outline: none;
            cursor: pointer;
            height: 36px;
        }
        .custom-extension-input {
            background-color: #2a2a2a;
            color: inherit;
            border: 1px solid #3a3a3a;
            border-radius: 20px;
            padding: 6px 12px;
            outline: none;
            width: 80px;
            display: none;
            height: 36px;
        }
        .custom-extension-input.show {
            display: inline-block;

            async function loadUserProfile() {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) return;

                const { data, error } = await supabase
                    .from('profiles')
                    .select('coin_balance')
                    .eq('id', user.id)
                    .single();

                if (error) {
                    console.error('Error loading profile:', error);
                    return;
                }

                creditBalance = data.coin_balance;
                updateCreditDisplay();

                supabase
                    .channel('profile-changes')
                    .on('postgres_changes', {
                        event: 'UPDATE',
                        schema: 'public',
                        table: 'profiles',
                        filter: `id=eq.${user.id}`
                    }, (payload) => {
                        creditBalance = payload.new.coin_balance;
                        updateCreditDisplay();
                    })
                    .subscribe();
            }

            async function deductCredits(amount) {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) return false;

                const { data: profile, error: fetchError } = await supabase
                    .from('profiles')
                    .select('coin_balance')
                    .eq('id', user.id)
                    .single();

                if (fetchError || !profile) return false;

                const newBalance = profile.coin_balance - amount;
                if (newBalance < 0) {
                    showInsufficientCredits();
                    return false;
                }

                const { error: updateError } = await supabase
                    .from('profiles')
                    .update({ coin_balance: newBalance })
                    .eq('id', user.id);

                if (updateError) {
                    console.error('Error deducting credits:', updateError);
                    return false;
                }
                return true;
            }

            function showInsufficientCredits() {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                errorDiv.textContent = 'Insufficient credits. Please purchase more credits.';
                chatMessagesDiv.appendChild(errorDiv);
                setTimeout(() => errorDiv.remove(), 3000);
            }

            // ----- ACCENT COLOR MANAGEMENT -----
            function setAccentColor(color) {
                document.documentElement.style.setProperty('--accent-color', color);
                let hoverColor = darkenColor(color, 20);
                document.documentElement.style.setProperty('--accent-hover', hoverColor);
                colorPickerBtn.style.backgroundColor = color;
                localStorage.setItem('accentColor', color);
                colorSwatches.forEach(swatch => {
                    if (swatch.dataset.color === color) {
                        swatch.classList.add('selected');
                    } else {
                        swatch.classList.remove('selected');
                    }
                });
            }
            function darkenColor(hex, percent) {
                let r = parseInt(hex.slice(1,3), 16);
                let g = parseInt(hex.slice(3,5), 16);
                let b = parseInt(hex.slice(5,7), 16);
                r = Math.max(0, r - percent);
                g = Math.max(0, g - percent);
                b = Math.max(0, b - percent);
                return `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
            }
            function loadAccentColor() {
                const saved = localStorage.getItem('accentColor');
                if (saved) {
                    setAccentColor(saved);
                } else {
                    setAccentColor('#00BFFF');
                }
            }

                loginContainer.id = 'chat-login-form';
                loginContainer.innerHTML = `

                    <input type="password" id="login-password-input" placeholder="Password">

                `;
                chatMessagesDiv.appendChild(loginContainer);

                document.getElementById('login-submit-btn').addEventListener('click', async () => {
                    const email = document.getElementById('login-email-input').value.trim();
                    const password = document.getElementById('login-password-input').value;

                    if (!email || !password) {
                        document.getElementById('login-error').textContent = 'Email and password required.';
                        return;
                    }

                    const { data, error } = await supabase.auth.signInWithPassword({
                        email,
                        password
                    });

                    if (error) {
                        document.getElementById('login-error').textContent = 'Invalid email or password.';
                        console.error('Login error:', error);
                        return;
                    }

                    currentUser = data.user;
                    updateLoginUI();
                    document.getElementById('chat-login-form').remove();

                    await loadUserProfile();
                    await loadConversations();
                    renderChatHistory();

                    if (!currentConversationId) newConversation();
                    else loadConversation(currentConversationId);
                });

                document.getElementById('login-password-input').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {

                document.getElementById('login-create-account').addEventListener('click', openRegisterModal);

                profileModal.classList.remove('show');
            }

                supabase.auth.getUser().then(({ data: { user } }) => {
                    if (user) {
                        currentUser = user;
                        loginBtn.innerHTML = '<i class="fas fa-user-check"></i>';
                        loginBtn.title = `Logged in as ${user.email}`;
                        messageInput.disabled = false;
                        sendBtn.disabled = false;
                        attachBtn.disabled = false;

            async function handleRegister() {
                const email = regEmail.value.trim();
                const password = regPassword.value;
                const confirm = regConfirm.value;
                const tos = regTos.checked;

                if (!email || !password || !confirm) {
                    registerError.textContent = 'All fields are required.';
                    return;
                }
                if (password !== confirm) {
                    registerError.textContent = 'Passwords do not match.';
                    return;
                }
                if (password.length < 6) {
                    registerError.textContent = 'Password must be at least 6 characters.';
                    return;

                if (!tos) {
                    registerError.textContent = 'You must accept the Terms of Service.';

                    password

                    return;

                closeRegisterModal();

            // ----- CONVERSATIONS -----
            async function saveConversations() {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) return;

                const conv = conversations.find(c => c.id === currentConversationId);
                if (!conv) return;

                if (currentConversationId && !currentConversationId.startsWith('conv_')) {
                    await supabase
                        .from('chats')
                        .update({ messages: conv.messages })
                        .eq('id', currentConversationId);
                } else {
                    const { data, error } = await supabase
                        .from('chats')
                        .insert({
                            user_id: user.id,
                            messages: conv.messages
                        })
                        .select()
                        .single();

                    if (!error) {
                        currentConversationId = data.id;
                        conv.id = data.id;
                    }
                }
            }

            async function loadConversations() {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) return;

                const { data, error } = await supabase
                    .from('chats')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('Error loading chats:', error);
                    return;
                }

                conversations = data.map(chat => ({
                    id: chat.id,
                    title: chat.messages[0]?.content?.substring(0, 30) || 'New chat',
                    messages: chat.messages
                }));

                if (conversations.length > 0) {
                    currentConversationId = conversations[0].id;
                }

                renderChatHistory();
            }

            function newConversation() {
                if (!isLoggedIn()) return;
                const conv = createNewConversation();
                currentConversationId = conv.id;
                loadConversation(conv.id);

            function createNewConversation() {
                const id = 'conv_' + Date.now();
                const conv = { id, title: 'New chat', messages: [] };
                conversations.unshift(conv);

                return conv;

            function loadConversation(id) {

            function deleteConversation(id) {
                const index = conversations.findIndex(c => c.id === id);
                if (index === -1) return;
                conversations.splice(index, 1);
                if (id === currentConversationId) {
                    if (conversations.length > 0) {

                        loadConversation(currentConversationId);

                renderChatHistory();
                if (!id.startsWith('conv_')) {
                    supabase.from('chats').delete().eq('id', id);
                }

                chatHistoryDiv.innerHTML = '';
